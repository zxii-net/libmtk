# Builds the Doxygen API reference and publishes it with GitHub Pages.
#
# Site layout: the root is the README (plus tutorial and pitfalls)
# rendered by docs/site/build.sh with pandoc; the Doxygen API
# reference goes under /docs/.  Not Jekyll: Liquid cannot cope with
# C code blocks containing "{{" (nested brace initializers).
#
# The configure-pages step enables Pages on first run. The custom
# domain (libmtk.dev.zxii.net) is configured in Settings -> Pages —
# with Actions-based deployment a CNAME file in the artifact is
# ignored, so the domain lives in the repo settings, not here.

name: docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Creates the Pages site (build_type "workflow") on first run,
      # so no manual Settings -> Pages step is needed.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install doxygen and pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen pandoc

      - name: Build site
        run: sh docs/site/build.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
